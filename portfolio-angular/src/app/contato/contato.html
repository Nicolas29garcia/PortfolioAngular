<mat-card class="contato-card">

  <mat-card-header>

    <mat-card-title>Contato</mat-card-title>

    <mat-card-subtitle>
      Entre em contato comigo
    </mat-card-subtitle>

  </mat-card-header>

  <mat-card-content>

    <form class="formulario">

      <mat-form-field appearance="outline">

        <mat-label>Nome</mat-label>

        <input matInput placeholder="Digite seu nome">

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>Email</mat-label>

        <input matInput placeholder="Digite seu email">

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>Mensagem</mat-label>

        <textarea
          matInput
          rows="6"
          placeholder="Digite sua mensagem">
        </textarea>

      </mat-form-field>

      <button mat-raised-button color="primary">

        Enviar Mensagem

      </button>

    </form>

    <div class="info-contato">

      <h3>Informações</h3>

      <p>
        Email:
        20241ctb0100076@estudantes.ifpr.edu.br
      </p>

      <p>
        GitHub:
        <a
          href="https://github.com/Nicolas29garcia"
          target="_blank">

          Nicolas29garcia

        </a>
      </p>

    </div>

  </mat-card-content>

</mat-card>
