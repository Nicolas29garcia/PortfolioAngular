<mat-sidenav-container class="container">

  <mat-sidenav #menu mode="side" class="menu">

    <h2>Menu</h2>

    <mat-nav-list>

      <a mat-list-item routerLink="/" (click)="menu.close()">
        Home
      </a>

      <a mat-list-item routerLink="/sobre" (click)="menu.close()">
        Sobre
      </a>

      <a mat-list-item routerLink="/projetos" (click)="menu.close()">
        Projetos
      </a>

      <a mat-list-item routerLink="/contato" (click)="menu.close()">
        Contato
      </a>

    </mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar color="primary">

      <button mat-icon-button (click)="menu.toggle()">

        <mat-icon>menu</mat-icon>

      </button>

      <span class="titulo">Meu Portfólio</span>

      <span class="espacador"></span>

      <a
        mat-button
        routerLink="/"
        routerLinkActive="ativo"
        [routerLinkActiveOptions]="{ exact: true }">

        Home

      </a>

      <a
        mat-button
        routerLink="/sobre"
        routerLinkActive="ativo">

        Sobre

      </a>

      <a
        mat-button
        routerLink="/projetos"
        routerLinkActive="ativo">

        Projetos

      </a>

      <a
        mat-button
        routerLink="/contato"
        routerLinkActive="ativo">

        Contato

      </a>

    </mat-toolbar>

    <main class="conteudo">

      <router-outlet></router-outlet>

    </main>

  </mat-sidenav-content>

</mat-sidenav-container>
